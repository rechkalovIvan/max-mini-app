<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MaxMiniApp - Главная</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-active: rgba(56, 189, 248, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(56, 189, 248, 0.3);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-gradient: linear-gradient(135deg, #0ea5e9, #38bdf8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 15% 0%, rgba(14, 165, 233, 0.15), transparent 40%),
                radial-gradient(circle at 85% 60%, rgba(56, 189, 248, 0.1), transparent 40%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
        }

        header {
            margin-bottom: 32px;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        header img {
            max-height: 50px;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
            max-width: 400px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
            opacity: 0;
            transform: translateY(20px);
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }

        .menu-grid {
            width: 100%;
            max-width: 440px;
            display: grid;
            gap: 16px;
        }

        .menu-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            opacity: 0;
            transform: translateY(20px);
        }

        .menu-card:active {
            transform: scale(0.97);
            background: var(--surface-active);
            border-color: var(--border-active);
        }

        .card-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 16px rgba(14, 165, 233, 0.2);
        }

        .card-content h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
        }

        .card-content p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .animate-in {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (hover: hover) {
            .menu-card:hover {
                border-color: var(--border-active);
                background: var(--surface-active);
                translate: 0 -4px;
            }
        }
    </style>
</head>

<body>
    <header>
        <img src="https://i.ibb.co/zTn0hhDK/logo.webp" alt="Logo">
    </header>

    <div class="hero">
        <h1>Добро пожаловать</h1>
        <p class="subtitle">Выберите интересующий вас раздел, чтобы продолжить работу с сервисом.</p>
    </div>

    <div class="menu-grid">
        <a href="calculator.html" class="menu-card animate-in" style="animation-delay: 0.4s">
            <div class="card-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <line x1="8" y1="6" x2="16" y2="6"></line>
                    <line x1="16" y1="14" x2="16" y2="18"></line>
                    <path d="M16 10h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M8 14h.01"></path>
                    <path d="M12 18h.01"></path>
                    <path d="M8 18h.01"></path>
                </svg>
            </div>
            <div class="card-content">
                <h3>Калькулятор</h3>
                <p>Рассчитайте стоимость химчистки вашей мебели за пару кликов.</p>
            </div>
        </a>

        <div class="menu-card animate-in" style="animation-delay: 0.5s; cursor: default;">
            <div class="card-icon" style="background: linear-gradient(135deg, #475569, #64748b);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>
            </div>
            <div class="card-content">
                <h3>Наши услуги</h3>
                <p>Скоро здесь появится полный список услуг и цен.</p>
            </div>
        </div>

        <div class="menu-card animate-in" style="animation-delay: 0.6s; cursor: default;">
            <div class="card-icon" style="background: linear-gradient(135deg, #059669, #10b981);">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
            </div>
            <div class="card-content">
                <h3>Поддержка</h3>
                <p>Нужна консультация? Мы всегда на связи в чате.</p>
            </div>
        </div>
    </div>
</body>

</html>
